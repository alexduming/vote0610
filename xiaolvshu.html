<!--
  小绿书 - 参考小红书首页设计的复刻版（绿色主题）
  ===============================================
  说明：
  - 单文件 HTML，HTML + CSS + JavaScript 全部内联
  - 双击文件即可在浏览器打开
  - 主色调：微信支付绿 #07C160（沉稳又有辨识度的国民绿）
  - 封面图使用 picsum.photos 占位（联网时显示真实照片，断网时显示纯色兜底）
  - 所有文案均为原创，主题围绕"绿色生活/户外/植物/可持续"
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小绿书 - 标记我的生活</title>
<style>
/* ============================================================
   全局重置：把浏览器默认样式清掉，统一基准
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  /* 字体优先苹方/微软雅黑，跨平台体验一致 */
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  font-size: 14px;
  color: #333;
  background: #fff;
  -webkit-font-smoothing: antialiased;
}

/* 滚动条美化（可选，让整体更精致） */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d8d8d8; border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================
   颜色变量：所有"绿"的来源都在这里，方便后续整体调色
   ============================================================ */
:root {
  --primary: #07C160;          /* 主绿（小绿书 logo 色） */
  --primary-dark: #06A552;     /* 深绿（hover、强调状态） */
  --primary-light: #E5F6EC;    /* 浅绿（标签底色、悬停背景） */
  --text-main: #333;           /* 正文黑 */
  --text-sub: #999;            /* 次要灰 */
  --text-light: #c0c0c0;       /* 更浅的灰（占位符） */
  --border: #f0f0f0;           /* 浅边框 */
  --bg-hover: #f3f5f7;         /* 悬停浅灰 */
}

/* ============================================================
   左侧固定侧边栏
   ============================================================ */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100vh;
  background: #fff;
  padding: 20px 16px 24px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  z-index: 100;
}

/* "小绿书" Logo —— 绿色圆角胶囊 */
.logo {
  display: inline-block;
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  background: var(--primary);
  padding: 8px 18px;
  border-radius: 24px;
  margin: 4px 0 30px 8px;
  letter-spacing: 1px;
  /* 加一点投影让 logo 有立体感 */
  box-shadow: 0 2px 8px rgba(7, 193, 96, 0.25);
  /* 让 logo 居中收缩，不撑满侧栏 */
  align-self: flex-start;
}

/* 导航列表 */
.nav-list { list-style: none; }

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-radius: 24px;
  cursor: pointer;
  margin-bottom: 4px;
  font-size: 16px;
  color: #333;
  transition: background 0.18s;
  position: relative;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); }

/* 当前选中状态（首页默认高亮） */
.nav-item.active {
  background: var(--bg-hover);
  font-weight: 700;
}

/* 侧边栏图标统一 24x24，留 14px 右边距 */
.nav-item .icon {
  width: 24px;
  height: 24px;
  margin-right: 14px;
  flex-shrink: 0;
}

.nav-item .label { flex: 1; }

/* AI 小标签（绿色款，呼应小绿书主题） */
.ai-tag {
  background: var(--primary-light);
  color: var(--primary);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 4px;
  font-weight: 600;
}

/* 未读消息红色徽章（参考小红书的 99+） */
.badge {
  background: #ff4757;
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-weight: 600;
  line-height: 1.2;
}

/* "世界杯"那种带小彩旗的装饰（这里改为绿叶 emoji） */
.deco-flag {
  font-size: 12px;
  margin-left: 2px;
  vertical-align: super;
}

/* 侧边栏底部（更多、关于我们）贴底 */
.sidebar-bottom {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ============================================================
   主内容区
   ============================================================ */
.main {
  margin-left: 220px;
  padding: 24px 32px 60px;
  min-height: 100vh;
}

/* 顶部搜索栏 —— 大圆角白卡片，居中 */
.search-wrap {
  max-width: 720px;
  margin: 8px auto 28px;
}
.search-card {
  background: #fff;
  border: 1px solid #eaeaea;
  border-radius: 28px;
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
  transition: box-shadow 0.2s;
}
.search-card:focus-within {
  /* 输入聚焦时投影加强，绿色微光 */
  box-shadow: 0 4px 16px rgba(7, 193, 96, 0.12);
  border-color: var(--primary-light);
}

.search-input {
  border: none;
  outline: none;
  font-size: 15px;
  color: #333;
  padding: 6px 4px;
  background: transparent;
  width: 100%;
}
.search-input::placeholder { color: var(--text-light); }

/* 搜索栏第二行：加号按钮 + AI 标签 + 搜索按钮 */
.search-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.plus-btn {
  width: 28px;
  height: 28px;
  border: 1.5px solid #e5e5e5;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #999;
  font-size: 16px;
  background: #fff;
  transition: all 0.2s;
}
.plus-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* "问点点 AI" 小药丸标签 */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 14px;
  background: #f5f5f5;
  font-size: 13px;
  color: #555;
  cursor: pointer;
}
.chip:hover { background: var(--primary-light); color: var(--primary); }

/* 右侧圆形搜索按钮 */
.search-btn {
  margin-left: auto;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #999;
  transition: all 0.2s;
}
.search-btn:hover {
  background: var(--primary);
  color: #fff;
}

/* ============================================================
   分类导航栏（推荐、户外、植物...）
   ============================================================ */
.category-bar {
  display: flex;
  align-items: center;
  gap: 28px;
  border-bottom: 1px solid var(--border);
  padding: 0 0 14px 0;
  margin: 0 auto 24px;
  max-width: 1600px;
  overflow-x: auto;
  /* 隐藏横向滚动条但仍可滑动 */
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }

/* 采集本页笔记 —— 绿色胶囊按钮 */
.collect-btn {
  background: var(--primary);
  color: #fff;
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 500;
  transition: background 0.2s;
}
.collect-btn:hover { background: var(--primary-dark); }

/* 分类标签 */
.category {
  font-size: 15px;
  color: #666;
  cursor: pointer;
  padding-bottom: 10px;
  position: relative;
  flex-shrink: 0;
  white-space: nowrap;
  transition: color 0.2s;
}
.category:hover { color: #333; }
.category.active {
  color: #333;
  font-weight: 700;
  font-size: 16px;
}
/* 选中时绿色下划线 */
.category.active::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -14px;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}

/* ============================================================
   瀑布流卡片 —— 用 CSS columns 实现，最简单
   ============================================================ */
.waterfall {
  columns: 5;
  column-gap: 16px;
  max-width: 1600px;
  margin: 0 auto;
}
/* 响应式：屏幕变窄时减少列数 */
@media (max-width: 1500px) { .waterfall { columns: 4; } }
@media (max-width: 1100px) { .waterfall { columns: 3; } }
@media (max-width: 800px)  { .waterfall { columns: 2; } }
@media (max-width: 500px)  { .waterfall { columns: 2; column-gap: 10px; } }

.note-card {
  break-inside: avoid;       /* 关键：防止卡片被分栏切开 */
  margin-bottom: 16px;
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  /* 用 inline-block 配合 columns，避免某些浏览器渲染问题 */
  display: inline-block;
  width: 100%;
}
.note-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
}

/* 封面图容器（图片自适应高度，让瀑布流自然错落） */
.cover {
  position: relative;
  width: 100%;
  display: block;
  overflow: hidden;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  /* 默认绿色渐变兜底，图片加载失败也能看 */
}
.cover img {
  width: 100%;
  display: block;
  object-fit: cover;
  transition: transform 0.4s;
}
.note-card:hover .cover img { transform: scale(1.05); }

/* 视频卡的右上角播放图标 */
.video-icon {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 26px;
  height: 26px;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 11px;
  backdrop-filter: blur(4px);
}

/* 笔记主体（标题+作者+点赞） */
.note-body {
  padding: 10px 8px 12px;
}
.note-title {
  font-size: 14px;
  line-height: 1.4;
  color: #333;
  /* 最多 2 行省略 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
  word-break: break-all;
}
.note-footer {
  display: flex;
  align-items: center;
  font-size: 12px;
  color: var(--text-sub);
}
/* 头像用渐变绿色圆，统一视觉风格 */
.avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  margin-right: 6px;
  background: linear-gradient(135deg, var(--primary), #4caf50);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
}
.author {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.likes {
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: color 0.2s;
}
.likes:hover { color: var(--primary); }
.likes .heart { font-size: 13px; }

/* ============================================================
   右下角浮动按钮（图片切换 + 刷新）
   ============================================================ */
.float-btns {
  position: fixed;
  right: 24px;
  bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 50;
}
.float-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #888;
  transition: all 0.2s;
}
.float-btn:hover {
  background: var(--primary);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(7, 193, 96, 0.25);
}

/* ============================================================
   响应式：小屏幕（手机）收起侧边栏，留出空间
   ============================================================ */
@media (max-width: 800px) {
  .sidebar {
    /* 手机端把侧边栏压成图标条 */
    width: 64px;
    padding: 16px 8px;
  }
  .sidebar .label,
  .sidebar .badge,
  .sidebar .ai-tag,
  .sidebar-bottom {
    display: none;
  }
  .logo {
    font-size: 12px;
    padding: 6px 8px;
    letter-spacing: 0;
  }
  .nav-item { justify-content: center; padding: 12px 0; }
  .nav-item .icon { margin-right: 0; }
  .main { margin-left: 64px; padding: 16px; }
  .search-wrap { margin: 0 auto 20px; }
}
</style>
</head>
<body>

<!-- ============================================================
     左侧固定导航栏
     ============================================================ -->
<aside class="sidebar">
  <!-- Logo -->
  <div class="logo">小绿书</div>

  <!-- 主导航 -->
  <ul class="nav-list">
    <!-- 首页（默认高亮） -->
    <li class="nav-item active">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>

    <!-- 自然节（替代世界杯，符合绿色主题） -->
    <li class="nav-item">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8 7 8 13 12 22c4-9 4-15 0-20z"/>

    <li class="nav-item">

      <span class="label">发布</span>
    </li>

    <!-- 消息（带未读徽章） -->
    <li class="nav-item">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <span class="label">消息</span>
      <span class="badge">99+</span>
    </li>

    <!-- 我 -->
    <li class="nav-item">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      </svg>

    </li>
  </ul>

  <!-- 底部贴底的辅助导航 -->
  <div class="sidebar-bottom">
    <ul class="nav-list">
      <li class="nav-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>

      </li>

        <span class="label">关于我们</span>

  </div>
</aside>

<!-- ============================================================
     主内容区
     ============================================================ -->
<main class="main">

  <!-- 顶部搜索栏 -->
  <div class="search-wrap">

      <input class="search-input" placeholder="搜索或输入任何问题">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          </svg>
          问点点
          <span class="ai-tag">ai</span>
        </span>
        <span class="search-btn" title="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>

        </span>

  <!-- 分类标签栏 -->
  <div class="category-bar">
    <span class="collect-btn">采集本页笔记</span>
    <span class="category active">推荐</span>

    <span class="category">户外</span>

<div class="float-btns">
  <div class="float-btn" title="切换布局">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>
  <div class="float-btn" title="刷新内容" onclick="renderNotes()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>

<script>
/* ============================================================
   笔记数据 —— 全部原创，主题围绕"绿色生活"
   ============================================================ */

/* ============================================================
   渲染瀑布流 —— 把 notes 数组变成 DOM
   ============================================================ */
function renderNotes() {
  const container = document.getElementById('waterfall');
  container.innerHTML = ''; // 清空旧内容

  notes.forEach((n, i) => {
    // 每次刷新都打乱顺序，做出"刷新有新内容"的感觉
    const card = document.createElement('div');
    card.className = 'note-card';

    // 取作者名第一个字作头像文字
    const avatarLetter = n.author.charAt(0);

    // 封面图片用 picsum.photos 提供随机图，seed 固定让同张图保持稳定
    // onerror 兜底：图片加载失败时显示纯绿渐变（CSS 已设置 cover 的背景）
    card.innerHTML = `
      <a class="cover" style="aspect-ratio: 3 / ${(n.h / 100).toFixed(2)};">
        <img src="https://picsum.photos/seed/lvshu${n.seed}/400/${n.h}"
             alt="${n.title}"
             loading="lazy"
             onerror="this.style.display='none'">
        ${n.video ? `<span class="video-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </span>` : ''}
      </a>
      <div class="note-body">
        <div class="note-title">${n.title}</div>
        <div class="note-footer">
          <span class="avatar">${avatarLetter}</span>
          <span class="author">${n.author}</span>
          <span class="likes">
            <svg class="heart" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${n.likes}
          </span>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

/* ============================================================
   交互逻辑：分类切换、点赞动画、刷新
   ============================================================ */

// 分类标签点击切换
document.querySelectorAll('.category').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.category').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
  });
});

// 侧边栏导航点击切换
document.querySelectorAll('.sidebar .nav-item').forEach(n => {
  n.addEventListener('click', () => {
    document.querySelectorAll('.sidebar .nav-item').forEach(x => x.classList.remove('active'));
    n.classList.add('active');
  });
});

// 点赞交互（事件代理，因为卡片是动态生成的）
document.getElementById('waterfall').addEventListener('click', (e) => {
  const likes = e.target.closest('.likes');
  if (likes) {
    e.stopPropagation();
    // 简单的"心跳"动画
    likes.style.transform = 'scale(1.3)';
    likes.style.color = 'var(--primary)';
    setTimeout(() => { likes.style.transform = 'scale(1)'; }, 200);
  }
});

// 初始渲染
renderNotes();
</script>
